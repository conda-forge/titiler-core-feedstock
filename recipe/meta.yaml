{% set name = "titiler" %}
{% set version = "2.0.5" %}
{% set python_min = "3.11" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}-core/{{ name }}_core-{{ version }}.tar.gz
    sha256: 68dc573e85890c7a21617defd554650a8a27edbec59b23758a861ccc397e46f9
    folder: titiler_core
  - url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}-xarray/{{ name }}_xarray-{{ version }}.tar.gz
    sha256: 3184ef97d3644aa02b34f86b9e940eb133c42b44a0abb75c85e906e9602e51d9
    folder: titiler_xarray
  - url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}-extensions/{{ name }}_extensions-{{ version }}.tar.gz
    sha256: 3e0c0baafeebeb8d79c28e5d74116bd90c578b06fce0699de5433acdfde1ffa2
    folder: titiler_extensions
  - url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}-mosaic/{{ name }}_mosaic-{{ version }}.tar.gz
    sha256: cbed8daa83f31552d058657a97862a62d0f7d0592564312d6bd02b23e6f9d18a
    folder: titiler_mosaic
  - url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}-application/{{ name }}_application-{{ version }}.tar.gz
    sha256: d100507a888c7d920fb794bb117188684ff4d8181ac4aa5be011aa60a0f34f6c
    folder: titiler_application

build:
  number: 0
  noarch: python

outputs:
  - name: titiler-core
    version: {{ version }}
    build:
      noarch: python
      script: |
        cd titiler_core
        python -m pip install . -vv --no-deps --no-build-isolation --ignore-installed --no-index
    requirements:
      host:
        - hatchling
        - pip
        - python {{ python_min }}
      run:
        - fastapi >=0.136.1
        - geojson-pydantic >=1.1.2,<3.0
        - jinja2 >=2.11.2,<4.0.0
        - numpy
        - pydantic ~=2.0
        - rasterio
        - rio-tiler >=9.0,<10.0
        - morecantile
        - simplejson
        - python >={{ python_min }}
    test:
      imports:
        - titiler
        - titiler.core
      commands:
        - pip check
      requires:
        - pip
        - python {{ python_min }}

  - name: titiler-xarray
    version: {{ version }}
    build:
      noarch: python
      script: |
        cd titiler_xarray
        python -m pip install . -vv --no-deps --no-build-isolation --ignore-installed --no-index
    requirements:
      host:
        - hatchling
        - pip
        - python {{ python_min }}
      run:
        - titiler-core
        - xarray
        - rioxarray
        - obstore
        - zarr >=3.1,<4.0
        - starlette-cramjam >=0.4,<1.0
        - pydantic-settings ~=2.0
        - python >={{ python_min }}
      run_constrained:
        - titiler-core ={{ version }}
    test:
      imports:
        - titiler
        - titiler.xarray
      commands:
        - pip check
      requires:
        - pip
        - python {{ python_min }}

  - name: titiler-extensions
    version: {{ version }}
    build:
      noarch: python
      script: |
        cd titiler_extensions
        python -m pip install . -vv --no-deps --no-build-isolation --ignore-installed --no-index
    requirements:
      host:
        - hatchling
        - pip
        - python {{ python_min }}
      run:
        - titiler-core
        - python >={{ python_min }}
      run_constrained:
        - titiler-core ={{ version }}
    test:
      imports:
        - titiler
        - titiler.extensions
      commands:
        - pip check
      requires:
        - pip
        - python {{ python_min }}

  - name: titiler-mosaic
    version: {{ version }}
    build:
      noarch: python
      script: |
        cd titiler_mosaic
        python -m pip install . -vv --no-deps --no-build-isolation --ignore-installed --no-index
    requirements:
      host:
        - hatchling
        - pip
        - python {{ python_min }}
      run:
        - titiler-core
        # TODO Package this on conda-forge
        # This is an extra dependency on PyPi
        # Should we add it here or add yet another output titiler-mosaic-json?
        # - cogeo-mosaic
        - python >={{ python_min }}
      run_constrained:
        - titiler-core ={{ version }}
    test:
      imports:
        - titiler
        - titiler.mosaic
      commands:
        - pip check
      requires:
        - pip
        - python {{ python_min }}

  - name: titiler-application
    version: {{ version }}
    build:
      noarch: python
      script: |
        cd titiler_application
        python -m pip install . -vv --no-deps --no-build-isolation --ignore-installed --no-index
    requirements:
      host:
        - hatchling
        - pip
        - python {{ python_min }}
      run:
        - titiler-core
        - titiler-xarray
        - titiler-extensions
        - titiler-mosaic
        - starlette-cramjam
        - pydantic-settings ~=2.0
        - starlette-cramjam >=0.4,<1.0
        - python >={{ python_min }}
        # titiler-application depends on titiler-core[telemetry] extra
        - opentelemetry-api
        - opentelemetry-sdk
        - opentelemetry-instrumentation-fastapi
        - opentelemetry-instrumentation-logging
        - opentelemetry-exporter-otlp
        # titiler-application depends on titiler-extensions[cogeo,stac]
        - rio-stac >=0.12,<0.13
        - rio-cogeo >=7.0,<8.0
        # titiler-application depends on titiler-mosaic[mosaicjson]
        - cogeo-mosaic >=9.0,<10.0
      run_constrained:
        - titiler-core ={{ version }}
        - titiler-xarray ={{ version }}
        - titiler-extensions ={{ version }}
        - titiler-mosaic ={{ version }}
    test:
      imports:
        - titiler
        - titiler.application
      commands:
        - pip check
      requires:
        - pip
        - python {{ python_min }}

about:
  home: https://github.com/developmentseed/titiler
  summary: A modern dynamic tile server built on top of FastAPI and Rasterio/GDAL.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - martinRenou
    - tylere
    - rsignell-usgs
